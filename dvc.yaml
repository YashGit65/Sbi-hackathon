stages:
  data_ingestion:
    cmd: python src/data_ingestion/data_ingestion.py
    deps:
      - src/data_ingestion/data_ingestion.py
    outs:
      - data/raw/customer.csv
      - data/raw/transactions.csv

  profile_agent:
    cmd: python src/agents/profile_agent.py
    deps:
      - src/agents/profile_agent.py
      - data/raw/customer.csv
      - data/raw/transactions.csv
    outs:
      - data/processed/profile/customer_profiles.csv

  goal_agent:
    cmd: python src/agents/goal_agent.py
    deps:
      - src/agents/goal_agent.py
      - data/processed/profile/customer_profiles.csv
    outs:
      - data/processed/profile/customer_profiles-with-goals.csv

  risk_agent:
    cmd: python src/agents/risk_agent.py
    deps:
      - src/agents/risk_agent.py
      - data/processed/profile/customer_profiles-with-goals.csv
    outs:
      - data/customer_profile/customer_profiles.csv

  recommender:
    cmd: python src/agents/recommender.py
    deps:
      - src/agents/recommender.py
      - data/customer_profile/customer_profiles.csv
    outs:
      - data/recommendation/profile-recommended.csv
